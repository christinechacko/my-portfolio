<div class="container">
  <p>Thanks for visiting my site! Feel free to leave me a message below or connect with me on <a class="body-links-contact" href="https://www.linkedin.com/in/christinechacko" target="_blank">LinkedIn</a>.</p>
  <form  class="contact-form" id="contactForm" action="https://formspree.io/f/mdawgjdg" method="POST">

    <label for="fname">name
    <input required class=inside type="text" id="name" name="name" placeholder="cool person" maxlength="50">
    </label>

    <label for="email">email
    <input required class=inside type="text" id="email" name="email" placeholder="so I can get back to you" maxlength="50">
    </label>

    <label for="subject">message
    <textarea required class=inside id="subject" name="subject" placeholder="i love your site!..." style="height:200px" maxlength="1000"></textarea>
    </label>

    <div id="captchaContainer">
      <span id="captcha"></span>
      <button type="button" id="refreshCaptcha">refresh CAPTCHA</button>
    </div>
    <label for="captchaInput">enter CAPTCHA:</label><br>
    <input class="inside" type="text" id="captchaInput" required><br>

    <input type="submit"></input>

  </form>
  <p style="padding: 2rem"id="message"></p>
</div>
